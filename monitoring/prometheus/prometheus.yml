# Prometheus Configuration for Security Triage System
#
# This configuration collects metrics from all services in the system.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'security-triage'
    environment: 'production'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  - 'alerts/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Monitoring Metrics Service (aggregated metrics)
  - job_name: 'monitoring-metrics'
    static_configs:
      - targets: ['monitoring-metrics:8000']
        labels:
          service: 'monitoring-metrics'
          component: 'monitoring'
    metrics_path: '/metrics'
    scrape_interval: 10s
